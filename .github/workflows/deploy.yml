name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/metrico-server

jobs:
  # ── 1. CI (typecheck + test + build) ───────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=server

      - name: Typecheck server
        run: npm run typecheck --workspace=server

      - name: Typecheck client
        run: npm run typecheck --workspace=client

      - name: Test server
        run: npm test --workspace=server

      - name: Test client
        run: npm test --workspace=client

      - name: Build client (smoke)
        run: npm run build --workspace=client

  # ── 2. Docker build & push to GHCR ────────────────────────────────────────
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to VPS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GH_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          REGISTRY: ghcr.io
          IMAGE_REPO: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG,GH_ACTOR,GHCR_TOKEN,DEPLOY_DIR,REGISTRY,IMAGE_REPO
          script: |
            set -euo pipefail

            cd "$DEPLOY_DIR"

            # ── Save previous image tag for rollback ──
            PREVIOUS_TAG=$(docker compose -f docker-compose.prod.yml ps --format json 2>/dev/null \
              | python3 -c "
            import sys, json
            try:
                data = json.load(sys.stdin)
                img = data[0].get('Image','') if isinstance(data, list) else ''
                print(img.rsplit(':', 1)[-1] if ':' in img else '')
            except Exception:
                print('')
            " 2>/dev/null || echo "")

            # ── Pull new image ──
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GH_ACTOR" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml pull app

            # ── Build client SPA ──
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml run --rm client-builder

            # ── Copy SPA to host nginx web root ──
            docker run --rm \
              -v metrico_client_dist:/src:ro \
              -v /var/www/metrico:/dst \
              alpine sh -c "rm -rf /dst/* && cp -rp /src/. /dst/ && echo 'SPA copied'"

            # ── Bring up app (host nginx serves SSL/static) ──
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml up -d --no-deps app

            # ── Wait for healthy (max 30s) ──
            echo "Waiting for health..."
            APP_CID=$(docker compose -f docker-compose.prod.yml ps -q app)
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$APP_CID" 2>/dev/null || echo "")
              if [ "$STATUS" = "healthy" ]; then
                echo "Service is healthy after ${i}x2s"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "Healthcheck failed — rolling back to $PREVIOUS_TAG"
                if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$IMAGE_TAG" ]; then
                  IMAGE_TAG="$PREVIOUS_TAG" docker compose -f docker-compose.prod.yml up -d --no-deps app
                fi
                exit 1
              fi
              sleep 2
            done

            # ── Prune old images ──
            docker image prune -f --filter "until=24h" || true

      - name: Notify Telegram — success
        if: success()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *metrico deployed*
            Tag: `${{ needs.build.outputs.image_tag }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            https://metrico360.ru

      - name: Notify Telegram — failure
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *metrico deploy FAILED*
            Tag: `${{ needs.build.outputs.image_tag }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
