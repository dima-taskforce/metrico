services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: file:/app/data/metrico.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      - data:/app/data
    networks:
      - metrico
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Build client SPA and copy to shared volume (runs once, then exits)
  client-builder:
    image: node:20-alpine
    restart: "no"
    working_dir: /build
    volumes:
      - ./client:/build/client
      - ./server/package.json:/build/server/package.json:ro
      - ./package.json:/build/package.json:ro
      - ./package-lock.json:/build/package-lock.json:ro
      - ./tsconfig.base.json:/build/tsconfig.base.json:ro
      - client_dist:/dist
    command: >
      sh -c "
        npm ci --workspace=client --ignore-scripts &&
        cd client &&
        NODE_ENV=production npx vite build --outDir /dist
      "

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - client_dist:/usr/share/nginx/html:ro
      - data:/app/data:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - metrico
    depends_on:
      app:
        condition: service_healthy

volumes:
  data:
  client_dist:
  certbot_www:
    external: true
    name: metrico_certbot_www
  letsencrypt:
    external: true
    name: metrico_letsencrypt

networks:
  metrico:
    driver: bridge
