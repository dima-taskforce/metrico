<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>

    <!-- Main case body - top face - yellow -->
    <radialGradient id="caseFace" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFD000"/>
      <stop offset="40%"  stop-color="#F5A800"/>
      <stop offset="75%"  stop-color="#D68500"/>
      <stop offset="100%" stop-color="#A85E00"/>
    </radialGradient>

    <!-- Case rim / side band -->
    <linearGradient id="caseRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C07800"/>
      <stop offset="30%"  stop-color="#E09000"/>
      <stop offset="60%"  stop-color="#A06000"/>
      <stop offset="100%" stop-color="#7A4400"/>
    </linearGradient>

    <!-- Red rubber grip ring -->
    <linearGradient id="rubberRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D93020"/>
      <stop offset="40%"  stop-color="#B82010"/>
      <stop offset="100%" stop-color="#801008"/>
    </linearGradient>

    <!-- Lock button -->
    <radialGradient id="btnFace" cx="40%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>

    <!-- Tape yellow -->
    <linearGradient id="tapeCol" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFACC"/>
      <stop offset="15%"  stop-color="#FFE620"/>
      <stop offset="85%"  stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#D4A400"/>
    </linearGradient>

    <!-- Hook metal -->
    <linearGradient id="hookMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0F0F0"/>
      <stop offset="50%"  stop-color="#B8B8B8"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>

    <!-- Belt clip -->
    <linearGradient id="clipMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C8C8C8"/>
      <stop offset="45%"  stop-color="#F8F8F8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>

    <filter id="mainShadow" x="-30%" y="-25%" width="170%" height="175%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#5A3000" flood-opacity="0.38"/>
    </filter>

    <filter id="softDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.28"/>
    </filter>

  </defs>

  <g transform="translate(220,210) rotate(-8)" filter="url(#mainShadow)">

    <!-- ══ TAPE STRIP ══ -->
    <g transform="translate(152, 8)">
      <rect x="0" y="-25" width="200" height="50" rx="5" fill="url(#tapeCol)"/>
      <!-- Top specular -->
      <rect x="0" y="-25" width="200" height="12" rx="5" fill="white" opacity="0.28"/>
      <!-- Bottom shadow -->
      <rect x="0" y="18" width="200" height="7" rx="3" fill="#A07800" opacity="0.4"/>

      <!-- Red caution zone -->
      <rect x="0" y="-25" width="10" height="50" fill="#CC2200" opacity="0.75" rx="2"/>

      <!-- Tick marks top -->
      <line x1="22"  y1="-25" x2="22"  y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="44"  y1="-25" x2="44"  y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="66"  y1="-25" x2="66"  y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="88"  y1="-25" x2="88"  y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="110" y1="-25" x2="110" y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="132" y1="-25" x2="132" y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="154" y1="-25" x2="154" y2="-11" stroke="#6A5000" stroke-width="2"/>
      <line x1="176" y1="-25" x2="176" y2="-11" stroke="#6A5000" stroke-width="2"/>

      <line x1="11"  y1="-25" x2="11"  y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="33"  y1="-25" x2="33"  y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="55"  y1="-25" x2="55"  y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="77"  y1="-25" x2="77"  y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="99"  y1="-25" x2="99"  y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="121" y1="-25" x2="121" y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="143" y1="-25" x2="143" y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="165" y1="-25" x2="165" y2="-17" stroke="#7A6010" stroke-width="1.5"/>
      <line x1="187" y1="-25" x2="187" y2="-17" stroke="#7A6010" stroke-width="1.5"/>

      <!-- Numbers -->
      <text x="18"  y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">10</text>
      <text x="40"  y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">20</text>
      <text x="62"  y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">30</text>
      <text x="84"  y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">40</text>
      <text x="106" y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">50</text>
      <text x="128" y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">60</text>
      <text x="150" y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">70</text>
      <text x="172" y="-1" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A3800" text-anchor="middle">80</text>

      <!-- Metal hook -->
      <rect x="194" y="-25" width="12" height="50" rx="3" fill="url(#hookMetal)"/>
      <rect x="200"  y="-25" width="6"  height="50" rx="2" fill="#D0D0D0"/>
      <circle cx="200" cy="-12" r="3" fill="#A0A0A0" stroke="#808080" stroke-width="0.8"/>
      <circle cx="200" cy="12"  r="3" fill="#A0A0A0" stroke="#808080" stroke-width="0.8"/>
    </g>

    <!-- ══ ROUND CASE - depth rim ══ -->
    <ellipse cx="0" cy="12" rx="152" ry="152" fill="#7A4400" opacity="0.65"/>
    <circle cx="0" cy="0" r="152" fill="url(#caseRim)"/>

    <!-- ══ RED RUBBER RING ══ -->
    <circle cx="0" cy="0" r="140" fill="url(#rubberRing)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FF4030" stroke-width="8"  opacity="0.15"/>
    <circle cx="0" cy="0" r="132" fill="none" stroke="#FF4030" stroke-width="5"  opacity="0.10"/>
    <circle cx="0" cy="0" r="124" fill="none" stroke="#FF4030" stroke-width="4"  opacity="0.08"/>

    <!-- Grip bump dots -->
    <circle cx="0"    cy="-138" r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="55"   cy="-126" r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="101"  cy="-92"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="130"  cy="-42"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="138"  cy="10"   r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="126"  cy="60"   r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="96"   cy="103"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="50"   cy="130"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-3"   cy="138"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-55"  cy="126"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-103" cy="92"   r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-130" cy="42"   r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-138" cy="-10"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-126" cy="-60"  r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-96"  cy="-103" r="4.5" fill="#A01008" opacity="0.7"/>
    <circle cx="-50"  cy="-130" r="4.5" fill="#A01008" opacity="0.7"/>

    <!-- ══ YELLOW FACE ══ -->
    <circle cx="0" cy="0" r="118" fill="url(#caseFace)"/>
    <circle cx="0" cy="0" r="118" fill="none" stroke="#8A5800" stroke-width="5" opacity="0.45"/>
    <!-- Dome specular -->
    <ellipse cx="-25" cy="-42" rx="68" ry="44" fill="white" opacity="0.18"/>
    <ellipse cx="-30" cy="-52" rx="30" ry="18" fill="white" opacity="0.12"/>

    <!-- ══ LABEL ══ -->
    <rect x="-70" y="-48" width="140" height="62" rx="10" fill="#D08000" opacity="0.4"/>
    <rect x="-68" y="-46" width="136" height="58" rx="9"  fill="#FFF9E8" opacity="0.92"/>
    <rect x="-68" y="-46" width="136" height="7"  rx="9"  fill="#CC2200" opacity="0.7"/>
    <text x="0" y="-20" font-family="Arial Black,Arial,sans-serif" font-size="17" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="1.5">METRICO</text>
    <line x1="-52" y1="-13" x2="52" y2="-13" stroke="#C89000" stroke-width="1.2" opacity="0.8"/>
    <text x="0" y="-3" font-family="Arial,sans-serif" font-size="8.5" fill="#666" text-anchor="middle" letter-spacing="2.5">MEASURE</text>

    <!-- ══ LOCK BUTTON ══ -->
    <circle cx="0" cy="52" r="28" fill="#3A3A3A" filter="url(#softDrop)"/>
    <circle cx="0" cy="52" r="26" fill="url(#btnFace)"/>
    <circle cx="0" cy="52" r="20" fill="#222"/>
    <circle cx="0" cy="52" r="20" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="-7" y="52" width="14" height="10" rx="2.5" fill="#AAA"/>
    <path d="M -5 52 Q -5 43 0 43 Q 5 43 5 52" fill="none" stroke="#AAA" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="-4" cy="46" rx="9" ry="5" fill="white" opacity="0.12"/>

    <!-- ══ TAPE EXIT SLOT ══ -->
    <rect x="106" y="-18" width="20" height="36" rx="5" fill="#7A5000"/>
    <rect x="109" y="-15" width="14" height="30" rx="4" fill="#4A2C00"/>
    <rect x="109" y="-15" width="14" height="8"  rx="3" fill="black" opacity="0.4"/>

    <!-- ══ BELT CLIP ══ -->
    <rect x="-14" y="-168" width="28" height="60" rx="6" fill="url(#clipMetal)" filter="url(#softDrop)"/>
    <rect x="-10" y="-165" width="20" height="54" rx="4" fill="#D8D8D8"/>
    <rect x="-8"  y="-163" width="16" height="50" rx="3" fill="#F0F0F0"/>
    <circle cx="0" cy="-154" r="4" fill="#B0B0B0" stroke="#909090" stroke-width="1"/>
    <circle cx="0" cy="-122" r="4" fill="#B0B0B0" stroke="#909090" stroke-width="1"/>
    <rect x="-16" y="-115" width="32" height="10" rx="3" fill="#C07800"/>

  </g>

</svg>
